{% extends 'base.html' %}
{% block title %}Editar Compra{% endblock %}
{% block content %}
<div class="container">
    <h2 class="text-center">Editar Compra</h2>
    <form method="POST" action="{% url 'actualizar_compra' compra.id_compra %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-success" type="submit">Actualizar</button>
        <a href="{% url 'listado_compras' %}" class="btn btn-secondary">Volver</a>
    </form>
</div>
{% endblock %}
