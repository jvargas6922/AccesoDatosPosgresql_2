{% extends 'base.html' %}
{% block title %}Editar Libro{% endblock %}
{% block content %}
<div class="container">
    <h2 class="text-center">Editar Libro</h2>
    <form method="POST" action="{% url 'actualizar_libro' libro.id_libro %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-success" type="submit">Actualizar</button>
        <a href="{% url 'listado_libros' %}" class="btn btn-secondary">Volver</a>
    </form>
</div>
{% endblock %}
