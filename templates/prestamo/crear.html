{% extends 'base.html' %}
{% block title %}Crear Préstamo{% endblock %}
{% block content %}
<div class="container">
    <h1 class="text-center">Crear Préstamo</h1>
    <form method="POST" action="{% url 'crear_prestamo' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-success" type="submit">Guardar</button>
        <a href="{% url 'listado_prestamos' %}" class="btn btn-secondary">Volver</a>
    </form>
</div>
{% endblock %}
