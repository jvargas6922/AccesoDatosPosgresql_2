{% extends 'base.html' %}
{% block title %}Listado de Categorías{% endblock %}
{% block content %}
<div class="container">
    <h1 class="text-center">Listado de Categorías</h1>
    <a href="{% url 'crear_categoria' %}" class="btn btn-primary mb-3">Crear Categoría</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Categoria</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            {% for categoria in categorias %}
                <tr>
                    <td>{{ categoria.nombre_categoria }}</td>
                    <td>
                        <a href="{% url 'editar_categoria' categoria.id_categoria %}" class="btn btn-warning btn-sm">Editar</a>
                        <a href="{% url 'eliminar_categoria' categoria.id_categoria %}" class="btn btn-danger btn-sm" onclick="return confirm('¿Estás seguro de que deseas eliminar este préstamo?');">Eliminar</a>
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
