{% extends 'base.html' %}
{% block title %}Editar Usuario{% endblock %}
{% block content %}
<div class="container">
    <h2 class="text-center">Editar Usuario</h2>
    <form method="POST" action="{% url 'actualizar_usuario' usuario.id_usuario %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-success" type="submit">Actualizar</button>
        <a href="{% url 'listado_autores' %}" class="btn btn-secondary">Volver</a>
    </form>
</div>
{% endblock %}
